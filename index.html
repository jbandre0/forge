<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>مفرداتي · Mufradaati</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F4EF;--bg2:#F0EDE8;--bg3:#EAE6DF;
  --card:#FFFFFF;--card2:#F5F2ED;--card3:#EDE9E2;
  --border:rgba(0,0,0,0.09);--border-hi:rgba(160,110,20,0.55);
  --gold:#9A7A1A;--goldL:#7A5F10;--goldD:#6A5010;
  --sand:#2C2420;--muted:#8A8070;--muted2:#AAA090;
  --accent:#B85C28;--green:#2A7A4A;--red:#B03030;--blue:#2A5EA8;--purple:#6B3F9A;
  --l1:#B03030;--l2:#B85C28;--l3:#9A7A1A;--l4:#2A5EA8;--l5:#6B3F9A;--lm:#2A7A4A;
}
body{background:var(--bg);color:var(--sand);font-family:'Cormorant Garamond','Amiri',Georgia,serif;min-height:100vh;overflow-x:hidden;}
input,select,textarea,button{font-family:inherit;}
input::placeholder,textarea::placeholder{color:var(--muted2);}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px;}
select option{background:var(--card);color:var(--sand);}
.atmo{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 15% 10%,rgba(154,122,26,0.07) 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 85% 85%,rgba(184,92,40,0.05) 0%,transparent 70%);}
.atmo::after{content:'';position:absolute;inset:0;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(0,0,0,0.012) 40px,rgba(0,0,0,0.012) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(0,0,0,0.012) 40px,rgba(0,0,0,0.012) 41px);
  mask-image:radial-gradient(ellipse at 50% 50%,black 30%,transparent 80%);}
.shell{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 18px 90px;}
nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:28px;}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;}
.brand-ar{font-family:'Amiri',serif;font-size:28px;color:var(--goldL);direction:rtl;}
.brand-en{font-size:9px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-top:2px;}
.nav-btns{display:flex;gap:2px;}
.nav-btn{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-size:12px;letter-spacing:.05em;background:transparent;color:var(--muted);transition:all .2s;}
.nav-btn:hover{color:var(--sand);}
.nav-btn.active{background:rgba(196,158,60,0.12);color:var(--goldL);border:1px solid rgba(196,158,60,0.2);}
.inp{width:100%;background:rgba(0,0,0,0.02);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--sand);font-size:15px;outline:none;transition:border-color .2s;}
.inp:focus{border-color:var(--border-hi);}
.lbl{display:block;font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
.field{margin-bottom:18px;}
.btn1{background:linear-gradient(135deg,var(--goldD),var(--accent));color:#fff;border:none;border-radius:10px;padding:13px 26px;font-size:14px;cursor:pointer;font-weight:600;letter-spacing:.05em;display:inline-flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(196,96,42,0.2);transition:all .2s;}
.btn1:hover{opacity:.9;transform:translateY(-1px);}
.btn1:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}
.btn2{background:transparent;color:var(--goldL);border:1px solid rgba(196,158,60,0.35);border-radius:10px;padding:11px 22px;font-size:13px;cursor:pointer;letter-spacing:.04em;transition:all .2s;}
.btn2:hover{border-color:var(--gold);background:rgba(196,158,60,0.06);}
.btn3{background:rgba(0,0,0,0.03);color:var(--sand);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;transition:all .2s;}
.btn3:hover{background:rgba(0,0,0,0.06);}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;}
.ar{font-family:'Amiri',serif;direction:rtl;color:var(--goldL);}
.s-head{font-size:10px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.s-head-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(196,158,60,0.25),transparent);}
.prog-bar{height:2px;background:rgba(0,0,0,0.06);border-radius:2px;}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease;background:linear-gradient(90deg,var(--gold),var(--accent));}
.flip-wrap{perspective:1400px;height:340px;margin-bottom:20px;cursor:pointer;}
.flip-inner{transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);height:100%;position:relative;}
.flip-inner.flipped{transform:rotateY(180deg);cursor:default;}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.flip-back{transform:rotateY(180deg);background:linear-gradient(145deg,var(--card),var(--card2));border-color:rgba(154,122,26,0.25);overflow-y:auto;justify-content:flex-start;padding-top:22px;}
.flip-face::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:3px;border-radius:0 0 40px 40px;background:linear-gradient(90deg,transparent,rgba(196,158,60,0.4),transparent);}
.rating-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rate-btn{border-radius:12px;padding:14px 5px;cursor:pointer;text-align:center;border:1px solid;transition:all .15s;font-weight:700;font-family:inherit;font-size:15px;letter-spacing:.03em;}
.rate-btn:hover{transform:translateY(-2px);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.modal{background:var(--card);border:1px solid rgba(154,122,26,0.2);border-radius:20px;padding:30px;max-width:460px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200;background:var(--card);border-radius:10px;padding:10px 20px;font-size:13px;letter-spacing:.04em;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15);opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid var(--border);}
.toast.show{opacity:1;}
.badge{font-size:10px;padding:3px 9px;border-radius:20px;white-space:nowrap;display:inline-block;letter-spacing:.04em;}
.tab-strip{display:flex;gap:5px;margin-bottom:22px;overflow-x:auto;padding-bottom:4px;}
.tab-strip::-webkit-scrollbar{height:2px;}
.tab-btn{flex-shrink:0;border-radius:8px;border:1px solid var(--border);padding:6px 14px;cursor:pointer;font-size:12px;color:var(--muted);background:transparent;transition:all .2s;white-space:nowrap;}
.tab-btn:hover{color:var(--sand);}
.word-row{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:13px 15px;display:flex;align-items:center;gap:13px;margin-bottom:7px;transition:border-color .2s;}
.word-row:hover{border-color:rgba(154,122,26,0.2);}
.box-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px;}
.box-card{border-radius:13px;padding:14px 11px;cursor:pointer;transition:all .15s;text-align:center;border:1.5px solid var(--border);background:var(--card);}
.box-card:hover{transform:translateY(-2px);}
.box-card.queue-box{border-style:dashed;opacity:.7;padding:10px 9px;cursor:default;}
.box-card.queue-box:hover{transform:none;}
.box-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;font-weight:700;}
.box-count{font-size:28px;font-weight:700;line-height:1;}
.queue-label{font-size:8px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px;font-weight:700;opacity:.8;}
.queue-count{font-size:21px;font-weight:700;line-height:1;}
.step-row{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);}
.step-row:last-child{border-bottom:none;}
.step-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.step-toggle{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .2s;}
.step-toggle.on{background:rgba(196,158,60,0.15);border-color:var(--gold);color:var(--goldL);}
.step-toggle.off{color:var(--muted2);}
.prompt-banner{background:rgba(196,158,60,0.07);border:1px solid rgba(196,158,60,0.28);border-radius:14px;padding:24px 20px;margin-bottom:18px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px 6px;text-align:center;}
.dialect-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.dialect-pill{border-radius:20px;border:1px solid var(--border);padding:5px 13px;font-size:11px;cursor:pointer;color:var(--muted);background:transparent;transition:all .2s;letter-spacing:.04em;}
.dialect-pill:hover{color:var(--sand);}
.dialect-pill.active{background:rgba(196,158,60,0.15);border-color:rgba(196,158,60,0.4);color:var(--goldL);}
.ornament{text-align:center;color:rgba(196,158,60,0.3);font-family:'Amiri',serif;font-size:20px;margin:20px 0;letter-spacing:8px;}
.end-btn{background:rgba(176,48,48,0.06);border:1px solid rgba(176,48,48,0.2);color:var(--red);border-radius:8px;cursor:pointer;font-size:12px;padding:5px 14px;letter-spacing:.04em;transition:all .2s;}
.end-btn:hover{background:rgba(176,48,48,0.12);}
.sub-tab-strip{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.sub-tab-btn{flex:1;padding:10px 6px;cursor:pointer;font-size:12px;color:var(--muted);background:transparent;border:none;border-right:1px solid var(--border);letter-spacing:.05em;transition:all .2s;text-align:center;}
.sub-tab-btn:last-child{border-right:none;}
.sub-tab-btn:hover{color:var(--sand);background:rgba(0,0,0,0.02);}
.sub-tab-btn.active{background:rgba(196,158,60,0.1);color:var(--goldL);font-weight:600;}
.preview-field{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.preview-ar{font-family:'Amiri',serif;direction:rtl;font-size:24px;color:var(--goldL);}
.preview-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(196,158,60,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.bulk-ta{width:100%;background:rgba(0,0,0,0.02);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--sand);font-size:14px;outline:none;resize:vertical;min-height:160px;line-height:1.8;transition:border-color .2s;}
.bulk-ta:focus{border-color:var(--border-hi);}
.bulk-result{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:5px;font-size:13px;}
.bulk-result.ok{background:rgba(42,122,74,0.07);border:1px solid rgba(42,122,74,0.18);}
.bulk-result.err{background:rgba(176,48,48,0.06);border:1px solid rgba(176,48,48,0.15);color:var(--muted);}
@media(max-width:480px){.box-grid,.stat-grid{grid-template-columns:1fr 1fr;}.rating-grid{grid-template-columns:1fr 1fr;}}
/* ── Bigger card back content ── */
.card-back-english{font-size:26px;font-weight:600;color:var(--sand);text-align:center;margin-bottom:10px;}
.card-back-example{font-family:'Amiri',serif;direction:rtl;font-size:22px;color:var(--goldL);text-align:center;line-height:1.6;margin-bottom:6px;}
.card-back-example-en{font-size:14px;color:var(--muted);font-style:italic;text-align:center;line-height:1.5;margin-bottom:12px;}
.card-back-forms{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px;}
.card-back-form{text-align:center;background:rgba(154,122,26,0.08);border-radius:9px;padding:7px 12px;}
.card-back-form-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px;}
.card-back-form-val{font-family:'Amiri',serif;direction:rtl;font-size:18px;color:var(--goldL);}
/* ── Apply tab ── */
.apply-mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;}
.apply-mode-btn{border-radius:13px;padding:18px 14px;cursor:pointer;text-align:center;border:1.5px solid var(--border);background:var(--card);transition:all .2s;}
.apply-mode-btn:hover{border-color:rgba(154,122,26,0.3);transform:translateY(-1px);}
.apply-mode-btn.active{background:rgba(154,122,26,0.08);border-color:rgba(154,122,26,0.45);}
.apply-mode-icon{font-size:26px;margin-bottom:8px;}
.apply-mode-label{font-size:13px;font-weight:600;color:var(--sand);margin-bottom:4px;}
.apply-mode-desc{font-size:11px;color:var(--muted);line-height:1.4;}
/* Generated text area */
.apply-text-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;margin-bottom:16px;}
.apply-text{font-family:'Amiri',serif;direction:rtl;font-size:26px;line-height:2.2;color:var(--sand);text-align:right;}
.apply-text-en{font-size:14px;color:var(--muted);line-height:1.8;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
/* Word highlights */
.w-known{color:var(--goldL);cursor:default;}
.w-new{color:var(--blue);text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;cursor:pointer;position:relative;}
.w-new:hover .w-tooltip{display:block;}
.w-tooltip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid rgba(42,94,168,0.3);border-radius:10px;padding:10px 14px;min-width:180px;max-width:240px;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.12);text-align:center;}
.w-tooltip-meaning{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--sand);margin-bottom:8px;direction:ltr;}
.w-tooltip-btns{display:flex;gap:6px;justify-content:center;}
.w-tooltip-btn{font-size:10px;padding:4px 10px;border-radius:6px;border:1px solid;cursor:pointer;font-family:inherit;letter-spacing:.04em;white-space:nowrap;}
/* Grammar focus grid */
.grammar-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px;}
.grammar-btn{border-radius:9px;padding:9px 10px;cursor:pointer;text-align:center;border:1px solid var(--border);background:transparent;font-size:12px;color:var(--muted);transition:all .2s;line-height:1.3;}
.grammar-btn:hover{color:var(--sand);border-color:rgba(154,122,26,0.25);}
.grammar-btn.active{background:rgba(154,122,26,0.1);border-color:rgba(154,122,26,0.4);color:var(--goldL);font-weight:600;}
/* Sentence list for grammar mode */
.sentence-row{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:10px;}
.sentence-ar{font-family:'Amiri',serif;direction:rtl;font-size:24px;color:var(--sand);line-height:1.7;text-align:right;margin-bottom:6px;}
.sentence-en{font-size:13px;color:var(--muted);line-height:1.5;}
</style>
</head>
<body>
<div class="atmo"></div>
<div class="toast" id="toast"></div>
<div id="sync-indicator" style="position:fixed;bottom:18px;right:18px;z-index:150;font-size:10px;color:var(--muted);letter-spacing:.06em;opacity:0;transition:opacity .4s;pointer-events:none"></div>
<div id="modal-root"></div>
<div class="shell">
  <nav>
    <div class="brand" onclick="goHome()">
      <div><div class="brand-ar">مفرداتي</div><div class="brand-en">Mufradaati</div></div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn active" id="nb-home"  onclick="setView('home')">Home</button>
      <button class="nav-btn"        id="nb-boxes" onclick="setView('boxes')">Boxes</button>
      <button class="nav-btn"        id="nb-add"   onclick="setView('add')">Add</button>
      <button class="nav-btn"        id="nb-apply" onclick="setView('apply')">Apply</button>
      <button class="nav-btn"        id="nb-stats" onclick="setView('stats')">Stats</button>
    </div>
  </nav>
  <div id="main"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const WORD_TYPES=["Noun","Verb","Adjective","Adverb","Phrase","Preposition","Conjunction","Other"];
const DIALECTS=["Universal","MSA","Darija","Shaami","Egyptian","Iraqi","Gulf","Other"];
const DAY_NAMES=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const BOXES=[
  {id:"l1q",label:"L1 Queue",color:"#C04848",isQueue:true,main:1},
  {id:"l1",label:"Level 1",color:"#C04848",isQueue:false,main:1},
  {id:"l2a",label:"L2A",color:"#C4602A",isQueue:false,main:2},
  {id:"l2b",label:"L2B",color:"#C4602A",isQueue:false,main:2},
  {id:"l3q",label:"L3 Queue",color:"#C49E3C",isQueue:true,main:3},
  {id:"l3",label:"Level 3",color:"#C49E3C",isQueue:false,main:3},
  {id:"l4q",label:"L4 Queue",color:"#3A7BC8",isQueue:true,main:4},
  {id:"l4",label:"Level 4",color:"#3A7BC8",isQueue:false,main:4},
  {id:"l5a",label:"L5A",color:"#9B59B6",isQueue:false,main:5},
  {id:"l5b",label:"L5B",color:"#9B59B6",isQueue:false,main:5},
  {id:"mastered",label:"Mastered",color:"#3A9864",isQueue:false,main:6},
];
const DAY_LEVELS={
  0:["l5b","l4","l3","l2b","l1"],1:["l2b","l1"],2:["l2b","l1"],
  3:["l3","l2b","l1"],4:["l2b","l1"],5:["l2b","l1"],6:["l2b","l1"],
};
const L3Q_DAYS=[2,6];
const SESSION_QUEUE_FOR_BOX={l1:"l1q",l1q:"l1q",l2a:"l2a",l2b:"l2a",l3:"l3q",l3q:"l3q",l4:"l4q",l4q:"l4q",l5a:"l5a",l5b:"l5a",mastered:"mastered"};

// ═══════════════════════════════════════════════════════════
// PIN — namespaces all data per user
// ═══════════════════════════════════════════════════════════
function getPin(){return localStorage.getItem("muf-pin")||"";}
function savePin(p){localStorage.setItem("muf-pin",p);}
function pinKey(k){const p=getPin();return p?`${p}-${k}`:k;}
// ═══════════════════════════════════════════════════════════
// STORAGE — localStorage as cache, KV as source of truth
// ═══════════════════════════════════════════════════════════
function ls(k,d){try{const v=localStorage.getItem(pinKey(k));return v!==null?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(pinKey(k),JSON.stringify(v));}catch{}}
function getWords(){return ls("muf-words",[]);}
function getBoxes(){return ls("muf-boxes",{l1:[],l1q:[],l2a:[],l2b:[],l3q:[],l3:[],l4q:[],l4:[],l5a:[],l5b:[],mastered:[]});}
function getSettings(){return ls("muf-settings",{l1Target:40});}
function getStats(){return ls("muf-stats",{sessions:[],lifetime:{reviewed:0,correct:0,byLevel:{}}});}
function getSession(){return ls("muf-session",null);}
function saveSession(s){ss("muf-session",s);}
function clearSession(){localStorage.removeItem(pinKey("muf-session"));}
// ── KV sync helpers ──
let _syncT=null;
function setSyncStatus(msg,col){
  const el=document.getElementById("sync-indicator");
  if(!el)return;
  el.textContent=msg;el.style.color=col||"var(--muted)";el.style.opacity="1";
  clearTimeout(_syncT);_syncT=setTimeout(()=>{el.style.opacity="0";},2500);
}
async function kvSet(key,value){
  if(insideClaude())return;
  try{
    await fetch(WORKER_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Action":"kv-set","X-Key":pinKey(key)},
      body:JSON.stringify(value)
    });
  }catch(e){}
}
async function kvGetAll(){
  if(insideClaude())return null;
  try{
    const r=await fetch(WORKER_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Action":"kv-getall","X-Pin":getPin()},
      body:"{}"
    });
    return await r.json();
  }catch(e){return null;}
}

// ═══════════════════════════════════════════════════════════
// MIDNIGHT QUEUE CLEAR — runs once per calendar day on load
// Auto-clears: L1Q→L1, L3Q→L3, L4Q→L4
// L2A→L2B and L5A→L5B are prompt-only (in-session)
// ═══════════════════════════════════════════════════════════
function runMidnightClear(){
  const key="muf-last-clear";
  const today=new Date().toDateString();
  if(ls(key,null)===today)return;
  const sess=getSession();
  if(sess&&sess.active)return; // don't run during live session
  const boxes=getBoxes();let changed=false;
  [["l1q","l1"],["l3q","l3"],["l4q","l4"]].forEach(([from,to])=>{
    const ids=boxes[from]||[];
    if(ids.length){boxes[to]=[...(boxes[to]||[]),...ids];boxes[from]=[];changed=true;}
  });
  if(changed)saveBoxes(boxes);
  ss(key,today);
}

function uid(){return`w${Date.now()}${Math.random().toString(36).slice(2,5)}`;}
function todayDow(){return new Date().getDay();}
function hexRgb(hex){const h=hex.replace("#","");return`${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)}`;}
function sHead(t){return`<div class="s-head">${t}<div class="s-head-line"></div></div>`;}
function wordById(id){return getWords().find(w=>w.id===id);}
function boxDef(id){return BOXES.find(b=>b.id===id)||{id,label:id,color:"#888",isQueue:false,main:1};}
function moveWords(ids,fromBox,toBox){const b=getBoxes();const set=new Set(ids);b[fromBox]=(b[fromBox]||[]).filter(id=>!set.has(id));b[toBox]=[...(b[toBox]||[]),...ids];saveBoxes(b);}
function addWordToBox(wordId,box){const b=getBoxes();if(!b[box])b[box]=[];if(!b[box].includes(wordId))b[box].push(wordId);saveBoxes(b);}
function removeWordFromBox(wordId,box){const b=getBoxes();b[box]=(b[box]||[]).filter(id=>id!==wordId);saveBoxes(b);}
let _toastT;
function toast(msg,col){col=col||"var(--green)";clearTimeout(_toastT);const el=document.getElementById("toast");el.textContent=msg;el.style.borderColor=col;el.style.color=col;el.classList.add("show");_toastT=setTimeout(()=>el.classList.remove("show"),2800);}
function sessionDoneToday(){const stats=getStats();const today=new Date().toDateString();return stats.sessions.some(s=>new Date(s.ts).toDateString()===today);}

// ROUTING LOGIC
// ═══════════════════════════════════════════════════════════
function correctDest(box,dow){
  if(box==="l5b")return"mastered";if(box==="l4")return"l5a";if(box==="l3")return"l4";
  if(box==="l2b")return L3Q_DAYS.includes(dow)?"l3q":"l3";if(box==="l1")return"l2a";return"l1";
}
function incorrectDest(box){
  if(box==="l5b")return"l4q";if(box==="l4")return"l3q";if(box==="l3")return"l2a";
  if(box==="l2b")return"l1q";if(box==="l1")return"l1q";return"l1q";
}

function renderReview(){
  const sess=getSession();
  if(!sess||!sess.active){setView("home");return renderHome();}
  if(sess.pendingPrompt)return renderPrompt(sess);
  const step=sess.steps[sess.stepIdx];
  if(!step||step.done||sess.queueIdx>=sess.queue.length){setTimeout(()=>finishStep(),0);return`<div style="text-align:center;padding:60px 0;color:var(--muted)">Loading…</div>`;}
  const wordId=sess.queue[sess.queueIdx];const word=wordById(wordId);
  if(!word){sess.queueIdx++;saveSession(sess);setTimeout(()=>render(),0);return`<div style="padding:60px 0"></div>`;}
  const def=boxDef(step.box);const c=def.color;const rg=hexRgb(c);
  const pctStep=sess.queue.length>0?(sess.queueIdx/sess.queue.length)*100:0;
  const doneSteps=sess.steps.filter(s=>s.done).length;

      <div class="ar" style="font-size:54px;text-align:center;line-height:1.45">${word.arabic}</div>`
    :`<div style="font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:20px">How do you say this?</div>
      <div style="font-size:32px;font-weight:600;color:var(--sand);text-align:center;line-height:1.4">${word.english}</div>`;

  // Back face content
  const backHtml=arEn
    ?`<div style="font-size:10px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;opacity:.7;margin-bottom:10px;flex-shrink:0">Answer</div>
      <div class="card-back-english">${word.english}</div>
      ${word.example?`<div class="card-back-example">${word.example.split(" — ")[0]||""}</div>
      <div class="card-back-example-en">${word.example.split(" — ")[1]||""}</div>`:""}
      ${formsHtml}`
    :`<div style="font-size:10px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;opacity:.7;margin-bottom:10px;flex-shrink:0">Answer</div>
      <div class="ar" style="font-size:48px;text-align:center;line-height:1.45;margin-bottom:10px">${word.arabic}</div>
      ${word.example?`<div class="card-back-example">${word.example.split(" — ")[0]||""}</div>
      <div class="card-back-example-en">${word.example.split(" — ")[1]||""}</div>`:""}
      ${formsHtml}`;

  return`

  </div>

      </div>
    </div>

    <button class="rate-btn" style="background:rgba(176,48,48,0.1);border-color:var(--red);color:var(--red)" onclick="rateWord('incorrect')">✗ Missed <span style="font-size:10px;opacity:.5;font-weight:400">[K]</span></button>
  </div>`:`<button class="btn1" style="width:100%;justify-content:center;font-size:15px;padding:15px" onclick="doFlip()">Reveal Answer</button>`}

}
function doFlip(){const sess=getSession();if(!sess)return;sess.flipped=true;saveSession(sess);render();}
let _undoState=null;
function rateWord(rating){
  const sess=getSession();if(!sess||!sess.active)return;
  const step=sess.steps[sess.stepIdx];const wordId=sess.queue[sess.queueIdx];
  const dest=rating==="correct"?correctDest(step.box,sess.dow):incorrectDest(step.box);
  _undoState={wordId,from:step.box,to:dest,queueIdx:sess.queueIdx,
    sessionCorrect:sess.sessionCorrect,sessionTotal:sess.sessionTotal,
    byLevel:JSON.parse(JSON.stringify(sess.byLevel||{})),
    stepCorrect:step.correct,stepIncorrect:step.incorrect};
  removeWordFromBox(wordId,step.box);addWordToBox(wordId,dest);
  sess.ratings[wordId]=rating;sess.moveLog.push({wordId,from:step.box,to:dest});
  if(rating==="correct")step.correct++;else step.incorrect++;
  sess.sessionTotal++;if(rating==="correct")sess.sessionCorrect++;
  if(!sess.byLevel[step.box])sess.byLevel[step.box]={correct:0,total:0};
  sess.byLevel[step.box].total++;if(rating==="correct")sess.byLevel[step.box].correct++;
  sess.queueIdx++;sess.flipped=false;saveSession(sess);render();
}
function undoLastCard(){
  if(!_undoState)return;
  const u=_undoState;_undoState=null;
  const sess=getSession();if(!sess||!sess.active)return;
  const step=sess.steps[sess.stepIdx];
  removeWordFromBox(u.wordId,u.to);addWordToBox(u.wordId,u.from);
  sess.queueIdx=u.queueIdx;sess.sessionCorrect=u.sessionCorrect;sess.sessionTotal=u.sessionTotal;
  sess.byLevel=u.byLevel;step.correct=u.stepCorrect;step.incorrect=u.stepIncorrect;
  if(sess.moveLog.length>0)sess.moveLog.pop();
  delete sess.ratings[u.wordId];
  sess.flipped=true;saveSession(sess);render();
  toast("Card undone — re-rate it","var(--gold)");
}

// ═══════════════════════════════════════════════════════════
// STEP FLOW
// ═══════════════════════════════════════════════════════════
function finishStep(){
  const sess=getSession();if(!sess)return;
  sess.steps[sess.stepIdx].done=true;const box=sess.steps[sess.stepIdx].box;

  if(box==="l5b"){
    const f=getBoxes();if((f.l5a||[]).length>0){
      sess.pendingPrompt={type:"move",from:"l5a",to:"l5b",msg:"Move L5A → L5B?",sub:"Words in L5A have waited their week and are ready to become L5B candidates."};
      saveSession(sess);render();return;
    }
  }
  if(box==="l4"){
    const f=getBoxes();if((f.l4q||[]).length>0){moveWords([...f.l4q],"l4q","l4");toast("L4 Queue → L4 ✓","var(--blue)");}
  }
  if(box==="l3"){
    const f=getBoxes();if((f.l3q||[]).length>0){moveWords([...f.l3q],"l3q","l3");toast("L3 Queue → L3 ✓","var(--gold)");}
  }
  if(box==="l2b"){
    const f=getBoxes();if((f.l2a||[]).length>0){
      sess.pendingPrompt={type:"move",from:"l2a",to:"l2b",msg:"Move L2A → L2B?",sub:"These words have waited 2 days and are ready to be reviewed in tomorrow's L2B session."};
      saveSession(sess);render();return;
    }
  }
  if(box==="l1"){
    const f=getBoxes();if((f.l1q||[]).length>0){moveWords([...f.l1q],"l1q","l1");}
    endSession(sess);return;
  }
  advanceStep(sess);
}
function advanceStep(sess){
  if(!sess)sess=getSession();if(!sess)return;
  sess.stepIdx++;
  if(sess.stepIdx>=sess.steps.length){endSession(sess);return;}
  const nextBox=sess.steps[sess.stepIdx].box;
  sess.queue=[...(getBoxes()[nextBox]||[])];sess.queueIdx=0;sess.flipped=false;
  saveSession(sess);render();
}
function renderPrompt(sess){
  const p=sess.pendingPrompt;const fd=boxDef(p.from);const td=boxDef(p.to);
  const cnt=(getBoxes()[p.from]||[]).length;
  return`<div style="min-height:320px;display:flex;flex-direction:column;justify-content:center">
    <div class="prompt-banner" style="text-align:center">
      <div style="font-size:32px;margin-bottom:14px">🔄</div>
      <div style="font-size:18px;font-weight:700;color:var(--goldL);margin-bottom:10px">${p.msg}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6">${p.sub}</div>
      <div style="font-size:14px;color:var(--sand);margin-bottom:22px">
        <span style="color:${fd.color}">${fd.label}</span>
        <span style="color:var(--muted);margin:0 10px">→</span>
        <span style="color:${td.color}">${td.label}</span>
        <span style="color:var(--muted);margin-left:8px">(${cnt} word${cnt!==1?"s":""})</span>
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn1" onclick="confirmPrompt(true)">Yes, move them</button>
        <button class="btn3" onclick="confirmPrompt(false)">Skip for now</button>
      </div>
    </div>
  </div>`;
}
function confirmPrompt(yes){
  const sess=getSession();if(!sess)return;const p=sess.pendingPrompt;
  if(yes){const b=getBoxes();moveWords([...(b[p.from]||[])],p.from,p.to);toast(`${boxDef(p.from).label} → ${boxDef(p.to).label} ✓`);}
  sess.pendingPrompt=null;saveSession(sess);advanceStep(sess);
}
function endSession(sess){
  const stats=getStats();const dow=sess.dow;
  stats.lifetime.reviewed=(stats.lifetime.reviewed||0)+sess.sessionTotal;
  stats.lifetime.correct=(stats.lifetime.correct||0)+sess.sessionCorrect;
  Object.keys(sess.byLevel||{}).forEach(box=>{
    if(!stats.lifetime.byLevel[box])stats.lifetime.byLevel[box]={correct:0,total:0};
    stats.lifetime.byLevel[box].correct+=sess.byLevel[box].correct;stats.lifetime.byLevel[box].total+=sess.byLevel[box].total;
  });
  stats.sessions.push({ts:Date.now(),dow,correct:sess.sessionCorrect,total:sess.sessionTotal,byLevel:sess.byLevel,moveLog:sess.moveLog});
  if(stats.sessions.length>300)stats.sessions=stats.sessions.slice(-300);
  saveStats(stats);
  saveSession({...sess,active:false,endedAt:Date.now()});
  setView("summary");
}
function confirmEndSession(){
  document.getElementById("modal-root").innerHTML=`

        </div>

}

async function runBulkAdd(){

    if(!engInput){results.push({input:line,error:"Could not parse"});continue;}
    const prompt=`You are an expert Arabic linguist. Generate a vocabulary flashcard.
English: "${engInput}"
Dialect: ${dialect_note(dialect)}
Detect word type. Use FULL diacritics on ALL Arabic text.

If Verb: extraFields MUST have exactly these 4 keys with non-empty values: "Past (هو)" (3rd person masc singular past), "Present (هو)" (3rd person masc singular present/mudari), "Masdar" (verbal noun), "Imperative (أنت)" (2nd person masc singular command).
If Noun: extraFields MUST have exactly these 2 keys: "Singular", "Plural" (use broken plural if it exists, otherwise sound plural).
If Adjective: extraFields MUST have exactly these 3 keys: "Masculine", "Feminine", "Plural" (broken plural if exists).
Otherwise: extraFields = {}.

Also provide one short natural example sentence in ${dialect_note(dialect)} with full diacritics, plus its English translation.

Respond ONLY with this exact JSON structure, no markdown:
{"arabic":"main form with diacritics","english":"${engInput}","wordType":"Verb or Noun or Adjective or Phrase or Other","extraFields":{"all keys filled as instructed"},"exampleAr":"sentence with diacritics","exampleEn":"english translation"}`;
    try{
      const r=await fetch(apiUrl(),{method:"POST",headers:apiHeaders(),
        body:JSON.stringify({model:"claude-sonnet-4-5-20250929",max_tokens:600,messages:[{role:"user",content:prompt}]})});
      const data=await r.json();const raw2=data.content?.find(c=>c.type==="text")?.text||"";
      const p=JSON.parse(raw2.replace(/```json|```/g,"").trim());
      const ex=p.exampleAr?(p.exampleEn?`${p.exampleAr} — ${p.exampleEn}`:p.exampleAr):"";
      const word={id:uid(),arabic:p.arabic,english:p.english||engInput,example:ex,wordType:p.wordType||"Other",dialect,forms:p.extraFields||{},createdAt:Date.now()};
      saveWords([...getWords(),word]);addWordToBox(word.id,targetBox);

function exportData(){
  const keys=["muf-words","muf-boxes","muf-settings","muf-stats","muf-session","muf-last-clear"];
  const snapshot={exportedAt:new Date().toISOString(),version:1};
  // Always read from pinned keys (where data actually lives with PIN system)
  keys.forEach(k=>{const v=localStorage.getItem(pinKey(k));if(v!==null)snapshot[k]=JSON.parse(v);});
  const blob=new Blob([JSON.stringify(snapshot,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`mufradaati-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast("Backup downloaded ✓");
}

function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const snapshot=JSON.parse(e.target.result);
      // Accept both namespaced ({pin}-muf-words) and plain (muf-words) backups
      const pin=getPin();
      const hasNamespaced=snapshot[`${pin}-muf-words`]||snapshot[`${pin}-muf-boxes`];
      const hasPlain=snapshot["muf-words"]||snapshot["muf-boxes"];
      if(!hasNamespaced&&!hasPlain){toast("Invalid backup file","var(--red)");return;}
      const wordCount=((hasNamespaced?(snapshot[`${pin}-muf-words`]||[]):(snapshot["muf-words"]||[]))).length;
      const dateStr=snapshot.exportedAt?new Date(snapshot.exportedAt).toLocaleDateString("en",{month:"short",day:"numeric",year:"numeric"}):"this file";
      document.getElementById("modal-root").innerHTML=`
        <div class="modal-overlay">
          <div class="modal" style="text-align:center">
            <div style="font-size:17px;font-weight:700;color:var(--sand);margin-bottom:10px">Import backup?</div>
            <div style="font-size:13px;color:var(--muted);margin-bottom:6px;line-height:1.6">Backup from <strong>${dateStr}</strong> — <strong>${wordCount}</strong> word${wordCount!==1?"s":""}.</div>
            <div style="font-size:12px;color:var(--muted);margin-bottom:24px;line-height:1.6">This will replace ALL current data. This cannot be undone.</div>
            <div style="display:flex;gap:10px;justify-content:center">
              <button class="btn1" onclick="closeModal();_importConfirmed()">Yes, import</button>
              <button class="btn3" onclick="closeModal()">Cancel</button>
            </div>
          </div>
        </div>`;
      window._pendingImport=snapshot;
    }catch(err){toast("Could not read file","var(--red)");input.value="";}
  };
  reader.readAsText(file);
}
function _importConfirmed(){
  const snap=window._pendingImport;if(!snap)return;
  const pin=getPin();
  const dataKeys=["muf-words","muf-boxes","muf-settings","muf-stats","muf-session","muf-last-clear"];
  dataKeys.forEach(k=>{
    // Try namespaced key first (backups made with PIN), fall back to plain key (old backups)
    const val=snap[`${pin}-${k}`]!==undefined?snap[`${pin}-${k}`]:snap[k];
    if(val!==undefined)ss(k,val);
  });
  window._pendingImport=null;
  // Flag so bootApp skips KV fetch on reload — prevents stale KV from overwriting what we just imported
  sessionStorage.setItem("muf-just-imported","1");
  // Sync imported data up to KV, then reload
  Promise.all([
    kvSet("muf-words",getWords()),
    kvSet("muf-boxes",getBoxes()),
    kvSet("muf-stats",getStats()),
    kvSet("muf-settings",getSettings())
  ]).finally(()=>{
    toast("Import successful — reloading…");
    setTimeout(()=>location.reload(),1200);
  });
}

        <button class="grammar-btn${s.grammarFocus===f.id?" active":""}"
          onclick="_applyState.grammarFocus='${f.id}';_applyState.result=null;render()">
          <div>${f.label}</div>
          <div style="font-family:'Amiri',serif;font-size:13px;opacity:.65;margin-top:2px">${f.desc}</div>
        </button>`).join("")}
    </div>`:"";

  const generateBtn=`<button class="btn1" onclick="generateApply()" ${s.loading||!hasMastered?"disabled":""} style="width:100%;justify-content:center;font-size:15px;padding:14px;margin-bottom:20px">
    ${s.loading?`<span class="spinner"></span> Generating…`:`✦ Generate ${s.mode==="reading"?"Passage":"Sentences"}`}
  </button>`;

  const errorHtml=s.error?`<div style="color:var(--red);font-size:12px;margin-bottom:16px;padding:10px 14px;background:rgba(176,48,48,0.06);border-radius:8px">${s.error}</div>`:"";

  const resultHtml=s.result?renderApplyResult(s.result):"";

  return`${sHead("Apply — مطبّق")}
  <div class="card" style="margin-bottom:16px">
    ${dialectSel}
    ${modeHtml}
    ${warningHtml}
    ${grammarHtml}
    ${generateBtn}
    ${errorHtml}
  </div>
  ${resultHtml}`;
}

function renderApplyResult(result){
  // Grammar mode: list of sentences
  if(_applyState.mode==="grammar"){
    const explanation=result.explanation
      ?`<div style="background:rgba(154,122,26,0.07);border:1px solid rgba(154,122,26,0.2);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:var(--sand);line-height:1.7">${result.explanation}</div>`
      :"";
    const rows=result.sentences.map((s,i)=>renderSentenceRow(s,i)).join("");
    return`<div>${explanation}${rows}
      <button class="btn2" style="margin-top:8px" onclick="generateApply()">↻ Regenerate</button>
    </div>`;
  }
  // Reading mode: paragraph with highlighted words
  if(!result.sentences||!result.sentences.length)return"";
  // Combine all sentences into one flowing paragraph display
  const parasHtml=result.sentences.map((s,i)=>renderSentenceRow(s,i)).join("");
  return`<div>${parasHtml}
    <button class="btn2" style="margin-top:8px" onclick="generateApply()">↻ Regenerate</button>
  </div>`;
}

function renderSentenceRow(s,idx){
  // Build the Arabic line with highlighted tokens
  const arHtml=s.words.map(w=>{
    if(w.isNew){
      const safeM=w.meaning.replace(/'/g,"&#39;").replace(/"/g,"&quot;");
      const wId=`w-${idx}-${Math.random().toString(36).slice(2,5)}`;
      return`<span class="w-new" id="${wId}" onclick="showWordPopup('${wId}','${safeM}','${encodeURIComponent(w.token)}')">${w.token}</span>`;
    }
    return`<span class="w-known">${w.token}</span>`;
  }).join(" ");
  return`<div class="sentence-row">
    <div class="sentence-ar">${arHtml}</div>
    ${s.en?`<div class="sentence-en">${s.en}</div>`:""}
  </div>`;
}

function showWordPopup(elId,meaning,encodedToken){
  // Remove any existing popup
  document.querySelectorAll(".w-popup").forEach(el=>el.remove());
  const trigger=document.getElementById(elId);if(!trigger)return;
  const token=decodeURIComponent(encodedToken);
  const popup=document.createElement("div");
  popup.className="w-popup";
  popup.style.cssText=`position:fixed;z-index:300;background:var(--card);border:1px solid rgba(42,94,168,0.3);border-radius:12px;padding:14px 16px;min-width:200px;max-width:260px;box-shadow:0 8px 32px rgba(0,0,0,.15);text-align:center;`;
  popup.innerHTML=`
    <div style="font-family:'Amiri',serif;font-size:22px;color:var(--goldL);direction:rtl;margin-bottom:4px">${token}</div>
    <div style="font-size:14px;color:var(--sand);margin-bottom:12px;font-family:'Cormorant Garamond',serif">${meaning}</div>
    <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
      <button onclick="addWordFromApply('${encodeURIComponent(token)}','${meaning.replace(/'/g,"&#39;")}','mastered')" style="font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--green);color:var(--green);background:rgba(42,122,74,0.08);cursor:pointer;font-family:inherit">✓ Add to Mastered</button>
      <button onclick="addWordFromApply('${encodeURIComponent(token)}','${meaning.replace(/'/g,"&#39;")}','l1q')" style="font-size:11px;padding:5px 10px;border-radius:7px;border:1px solid var(--blue);color:var(--blue);background:rgba(42,94,168,0.08);cursor:pointer;font-family:inherit">+ Add to L1 Queue</button>
    </div>
    <div style="font-size:10px;color:var(--muted2);margin-top:8px">or tap elsewhere to close</div>`;
  // Position near trigger
  const rect=trigger.getBoundingClientRect();
  const top=rect.top-160>0?rect.top-150:rect.bottom+8;
  popup.style.top=top+"px";
  popup.style.left=Math.max(8,Math.min(rect.left,window.innerWidth-270))+"px";
  document.body.appendChild(popup);
  // Click outside to close
  setTimeout(()=>document.addEventListener("click",function h(e){if(!popup.contains(e.target)&&e.target.id!==elId){popup.remove();document.removeEventListener("click",h);}},true),100);
}

function addWordFromApply(encodedToken,meaning,targetBox){
  const token=decodeURIComponent(encodedToken);
  // Check if already in system
  const existing=getWords().find(w=>w.arabic===token);
  if(existing){
    // Just move to target box if not already there
    const boxes=getBoxes();
    const alreadyThere=(boxes[targetBox]||[]).includes(existing.id);
    if(!alreadyThere){
      // Remove from current boxes
      Object.keys(boxes).forEach(k=>boxes[k]=(boxes[k]||[]).filter(x=>x!==existing.id));
      boxes[targetBox]=[...(boxes[targetBox]||[]),existing.id];
      saveBoxes(boxes);
      toast(`"${token}" moved to ${boxDef(targetBox).label} ✓`);
    }else{
      toast(`Already in ${boxDef(targetBox).label}`,"var(--muted)");
    }
  }else{
    // Create new word
    const word={id:uid(),arabic:token,english:meaning,example:"",wordType:"Other",dialect:_applyState.dialect,forms:{},createdAt:Date.now()};
    saveWords([...getWords(),word]);
    addWordToBox(word.id,targetBox);
    toast(`"${token}" added to ${boxDef(targetBox).label} ✓`);
  }
  document.querySelectorAll(".w-popup").forEach(el=>el.remove());
}

async function generateApply(){
  const masteredIds=(getBoxes().mastered||[]);
  const masteredWords=masteredIds.map(id=>wordById(id)).filter(Boolean);
  const allWords=getWords();
  const wordPool=masteredWords.length>0?masteredWords:allWords;
  if(!wordPool.length){toast("No words in system yet","var(--red)");return;}

  _applyState={..._applyState,loading:true,result:null,error:null};render();

  const dialect=_applyState.dialect;
  const dialectNote=DIALECT_NOTES[dialect]||dialect;
  const mode=_applyState.mode;

  // Build word bank — keep it under ~40 words to avoid prompt bloat
  const wordBank=wordPool.slice(0,40).map(w=>{
    let entry=w.arabic+" ("+w.english+", "+w.wordType+")";
    if(w.forms&&Object.keys(w.forms).length>0){
      const formStr=Object.entries(w.forms).map(function(kv){return kv[0]+": "+kv[1];}).join(", ");
      entry+=" ["+formStr+"]";
    }
    return entry;
  }).join("\n");

  let prompt="";

  if(mode==="reading"){
    prompt=`You are an expert Arabic language teacher specializing in ${dialectNote}.

The student has mastered these Arabic words:
${wordBank}

Task: Write a natural, flowing paragraph (5–7 sentences) in ${dialectNote} with FULL diacritics on every word. The paragraph should:
- Use as many of the mastered words as possible in natural context
- Have a coherent topic (daily life, a story, a scene, etc.)
- Be at a slightly challenging but readable level
- Feel authentic to the dialect, not like a textbook

Then return a word-by-word analysis so new words can be highlighted.

CRITICAL: Respond ONLY with valid JSON, no markdown:
{
  "sentences": [
    {
      "ar": "full Arabic sentence with diacritics",
      "en": "English translation",
      "words": [
        {"token": "each Arabic word WITH diacritics exactly as it appears", "meaning": "English meaning", "isNew": true or false}
      ]
    }
  ]
}

For "isNew": mark as false if the word (or its root/base form) is in the mastered list above. Mark as true if it is genuinely new vocabulary the student hasn't seen. Function words (و، في، على، من، إلى، هو، هي، ال etc.) should be marked isNew: false since they are basic grammar.`;
  } else {
    // Grammar mode
    const focus=GRAMMAR_FOCUSES.find(f=>f.id===_applyState.grammarFocus)||GRAMMAR_FOCUSES[0];
    const structureInstructions={
      "past-simple":"Write 6 sentences using past tense verbs (فعل ماضٍ). Vary the subject (أنا، أنت، هو، هي، نحن، هم). Use mastered vocabulary as objects or context.",
      "present-simple":"Write 6 sentences using present/imperfect tense (فعل مضارع). Vary subjects. Show the full conjugation range.",
      "future":"Write 6 sentences about the future using سَـ / سَوْفَ (MSA) or appropriate dialect equivalents. Vary subjects and contexts.",
      "imperative":"Write 6 imperative sentences (أوامر). Vary between masculine singular, feminine singular, and plural. Include both positive and negative imperatives.",
      "negation-maa":"Write 6 sentences using ما or لا for negation. Show different negation patterns — negating verbs, nouns, adjectives.",
      "negation-lam":"Write 6 sentences using لَمْ (negates present used as past) and لَنْ (negates future). Demonstrate the jussive/subjunctive mood they require.",
      "idaafa":"Write 6 sentences showcasing the idaafa (إضافة) construct — two or more nouns in a genitive relationship. Show both definite and indefinite idaafa.",
      "accusative":"Write 6 sentences clearly demonstrating the accusative case (المفعول به / المنصوب). Include direct objects, circumstantial accusatives (حال), and accusative of specification (تمييز) where natural.",
      "genitive":"Write 6 sentences demonstrating the genitive case (المجرور) after prepositions (في، على، من، إلى، بـ، لـ، عن، مع). Vary the prepositions.",
      "dual":"Write 6 sentences using dual forms (المثنى) for nouns, adjectives, and verbs. Show both nominative and oblique dual endings.",
      "broken-plural":"Write 6 sentences that naturally include nouns or adjectives with broken plurals (جمع التكسير). Vary the patterns (فُعُول، أَفْعَال، فِعَال، فُعَلاء etc.).",
      "verb-agreement":"Write 6 sentences showing verb–subject agreement rules: verb before subject (singular verb), verb after subject (fully inflected). Include both masculine and feminine subjects.",
      "relative-clause":"Write 6 sentences using relative clauses with الذي، التي، الذين، اللواتي (MSA) or dialect equivalents. Include both definite and indefinite antecedents.",
      "conditional":"Write 6 conditional sentences using لَوْ (unreal/past) and إِذَا (real/future). Show the correct mood in both clauses. Include 3 with لو and 3 with إذا.",
      "passive":"Write 6 sentences in the passive voice (المبني للمجهول). Vary tenses (past and present passive). Show how the voweling changes from active.",
      "comparative":"Write 6 sentences using comparative (أَفْعَل) and superlative forms. Include elative forms and comparisons with من.",
    }[focus.id]||"Write 6 varied sentences demonstrating this grammar concept.";

    prompt=`You are an expert Arabic language teacher specializing in ${dialectNote}.

The student has mastered these Arabic words:
${wordBank}

Grammar focus: ${focus.label} (${focus.desc})

Task: ${structureInstructions}

Use mastered vocabulary where natural. Add other vocabulary as needed. FULL diacritics on every single Arabic word — this is essential for the student to learn pronunciation.

Start your response with a 1–2 sentence plain-English explanation of the grammatical concept and what to notice in the sentences.

CRITICAL: Respond ONLY with valid JSON, no markdown:
{
  "explanation": "Brief English explanation of the grammar concept and what to watch for",
  "sentences": [
    {
      "ar": "Arabic sentence with FULL diacritics",
      "en": "English translation",
      "words": [
        {"token": "each Arabic word with diacritics", "meaning": "English meaning", "isNew": true or false}
      ]
    }
  ]
}

For "isNew": false = in mastered list or is a basic function word. true = genuinely new vocabulary.`;
  }

  try{
    const resp=await fetch(apiUrl(),{
      method:"POST",
      headers:apiHeaders(),
      body:JSON.stringify({
        model:"claude-sonnet-4-5-20250929",
        max_tokens:4000,
        system:"You are an expert Arabic language teacher. Always respond with valid JSON only — no markdown fences, no explanation outside the JSON, no preamble.",
        messages:[{role:"user",content:prompt}]
      })
    });
    const data=await resp.json();
    if(data.error){
      _applyState={..._applyState,loading:false,error:`API error (${data.error.type}): ${data.error.message}`};
      render();return;
    }
    const raw=data.content?.find(c=>c.type==="text")?.text||"";
    if(!raw){
      _applyState={..._applyState,loading:false,error:`Empty response from API. Full: ${JSON.stringify(data).slice(0,200)}`};
      render();return;
    }
    // Strip any markdown fences robustly
    const jsonMatch=raw.match(/\{[\s\S]*\}/);
    if(!jsonMatch){
      _applyState={..._applyState,loading:false,error:`No JSON found in response: ${raw.slice(0,200)}`};
      render();return;
    }
    let parsed;
    try{parsed=JSON.parse(jsonMatch[0]);}
    catch(je){_applyState={..._applyState,loading:false,error:`JSON parse error: ${je.message}. Text: ${raw.slice(0,200)}`};render();return;}
    _applyState={..._applyState,loading:false,result:parsed};
  }catch(e){
    _applyState={..._applyState,loading:false,error:`Fetch failed: ${e.message||String(e)}`};
  }
  render();
}

function submitPin(skipKey){
  const pin=(document.getElementById("pin-input")?.value||"").trim();

  if(pin.length<4){errEl.style.display="block";errEl.textContent="PIN must be at least 4 digits";return;}

async function bootApp(){
  if(!insideClaude()){
    const justImported=sessionStorage.getItem("muf-just-imported");
    sessionStorage.removeItem("muf-just-imported");
    if(!justImported){
      // Normal boot: pull latest data from KV
      setSyncStatus("↓ loading…","var(--muted)");
      const remote=await kvGetAll();
      if(remote){
        const keys=["muf-words","muf-boxes","muf-settings","muf-stats","muf-last-clear"];
        keys.forEach(k=>{const pk=pinKey(k);if(remote[pk]!==undefined)localStorage.setItem(pk,remote[pk]);});
        setSyncStatus("✓ synced","var(--green)");
      } else {setSyncStatus("","var(--muted)");}
    }
    // If justImported: localStorage already has fresh data — skip KV fetch to avoid overwrite
  }
  runMidnightClear();
  const sess=getSession();
  if(sess&&sess.active)_view="review";
  render();
}

// BOOT
// ═══════════════════════════════════════════════════════════
(function init(){
  if(insideClaude()){bootApp();return;}
  if(!sessionStorage.getItem("muf-proxy-ok")&&!sessionStorage.getItem("muf-skip-key")){
    runMidnightClear();
    renderApiSetup();
    return;
  }
  if(!getPin()){renderPinScreen();return;}
  bootApp();
})();

// ═══════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS — session mode only
// Space = flip card  |  J / 1 = Got it  |  K / 2 = Missed
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown',function(e){
  if(_view!=='review')return;
  const sess=getSession();
  if(!sess||!sess.active||sess.pendingPrompt)return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.isContentEditable)return;
  if(e.key===' '||e.code==='Space'){
    e.preventDefault();
    if(!sess.flipped)doFlip();
  }else if((e.key==='j'||e.key==='J'||e.key==='1')&&sess.flipped){
    e.preventDefault();rateWord('correct');
  }else if((e.key==='k'||e.key==='K'||e.key==='2')&&sess.flipped){
    e.preventDefault();rateWord('incorrect');
  }
});
